# MANTA Configuration — LSA64 (Argentine Sign Language) with ResNet-50
# Dataset: 64 classes, 50 videos/class (10 subjects × 5 samples)
# Split: 38 train / 12 val / 14 test classes (disjoint)
#
# Paper: Similar setup to Kinetics/UCF101 (spatial dataset, 10,000 training tasks)

model:
  backbone: resnet50
  d_model: 2048              # ResNet-50 output dimension
  scales: [1, 2, 4]          # O — multi-scale set (Table 3 ablation)
  d_state: 64                # Mamba-2 state space dimension
  d_conv: 4                  # Mamba-2 local convolution width
  expand: 2                  # Mamba-2 expansion factor
  temperature: 0.07          # τ — contrastive temperature
  lambda_ce: 4.0             # λ — cross-entropy loss weight (Eq. 14)
  pretrained_backbone: true  # Use ImageNet pretrained weights
  freeze_backbone: true      # Freeze backbone during training
  backbone_weights_path: pretrained/resnet50_imagenet.pth  # Local weights file (comment out to auto-download)

data:
  dataset: lsa64
  split_dir: data/splits     # train.txt / val.txt / test.txt

  # Frame sampling — default F=8 per paper's regular setup
  num_frames: 16              # F — frames per sub-sequence (use 16 for long sub-sequence)
  image_size: 224            # Crop size (224×224)
  resize_size: 256           # Resize before crop
  use_horizontal_flip: true  # Random horizontal flip (sign language is not direction-sensitive like SSv2)

episode:
  n_way: 5                   # 5-way classification
  k_shot: 1                  # 1-shot (change to 5 for 5-shot)
  num_query: 5               # 5 query samples per class

training:
  num_tasks: 10000           # Number of training episodes (same as Kinetics/UCF101/HMDB51)
  batch_size: 1              # 1 episode per optimization step
  optimizer: sgd
  lr: 0.001                  # Initial learning rate
  momentum: 0.9
  weight_decay: 0.0005       # L2 regularization
  lr_scheduler: cosine       # Cosine annealing
  min_lr: 0.000001           # Minimum LR for cosine schedule
  grad_clip: 10.0            # Gradient clipping max norm
  log_interval: 100          # Log every N tasks
  save_interval: 5000        # Save checkpoint every N tasks
  seed: 42
  num_workers: 8

evaluation:
  interval: 1000             # Validate every N training tasks
  val_tasks: 600             # Number of validation episodes
  num_tasks: 10000           # Number of test episodes (final eval)

output:
  save_dir: checkpoints/lsa64_rn50_5way1shot_f16
  log_dir: logs/lsa64_rn50_5way1shot_f16